# 宝石拆卸台 GUI 配置
# 玩家使用 /mgem disassemble 打开
# 将镶嵌过可拆卸宝石(RemoveAble: true)的装备放入装备槽,
# 下方会列出所有可拆卸的宝石, 点击即可拆卸并退还宝石实物

# GUI 标题, 支持颜色代码 &
Title: "&8&l&k||&b&l宝石拆卸台&8&l&k||"

# 布局: 每行 9 个字符, 最多 6 行, 超出的行会被舍弃, 不足 9 个字符的行右侧补空气
# 字符含义:
#   E = 装备槽 (放入待拆卸装备, 有且建议只有一个)
#   G = 宝石展示区 (自动列出可拆卸宝石, 可跨多格, 支持分页)
#   I = 说明图标 (仅展示, 不可点击)
#   < = 上一页按钮
#   > = 下一页按钮
#   其它字符 (如 #) = 边框填充 (不可点击)
Slots:
  - "####E####"
  - "#GGGGGGG#"
  - "#GGGGGGG#"
  - "#GGGGGGG#"
  - "#GGGGGGG#"
  - "<###I###>"

# 边框填充图标材质
Filler: BLACK_STAINED_GLASS_PANE

# 装备槽为空时的占位提示图标
EquipHint:
  Material: ITEM_FRAME
  Name: "&e▼ 放入待拆卸的装备 ▼"
  Lore:
    - "&7将镶嵌过宝石的装备放到这里"
    - "&7仅接受含有可拆卸宝石的装备"

# 说明图标
Info:
  Material: BOOK
  Name: "&b&l拆卸说明"
  Lore:
    - "&7将镶嵌过宝石的装备放入上方装备槽"
    - "&7下方会列出所有可拆卸的宝石"
    - "&7点击宝石即可拆卸, 并退还宝石实物"
    - "&c部分宝石拆卸需要支付费用"

# 上一页按钮
Prev:
  Material: ARROW
  Name: "&8« 上一页"

# 下一页按钮
Next:
  Material: ARROW
  Name: "&8下一页 »"

# 每颗可拆卸宝石图标追加到 Lore 末尾的操作提示 (支持颜色代码 &)
ClickTip: "&e▶ 点击拆卸此宝石"
